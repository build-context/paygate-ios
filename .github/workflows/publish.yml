name: Publish

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cocoapods:
    runs-on: macos-latest
    if: ${{ secrets.COCOAPODS_TRUNK_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
      - name: Install CocoaPods
        run: gem install cocoapods --no-document
      - name: Trunk push PaygateSDK
        env:
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
        run: pod trunk push PaygateSDK.podspec --allow-warnings
